replicaCount: 4

web_image:
  repository: registry.access.redhat.com/ubi9/httpd-24
  pullPolicy: IfNotPresent
  tag: "9.7"
  port: 8080

service:
  type: ClusterIP
  port: 8080

resources:
  limits:
    cpu: 40m
    memory: 50Mi
  requests:
    cpu: 10m
    memory: 25Mi


serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""
ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
    # - secretName: chart-example-tls
    #   hosts:
    #     - chart-example.local

httpRoute:
  # HTTPRoute enabled.
  enabled: false
  # HTTPRoute annotations.
  annotations: {}
  # Which Gateways this Route is attached to.
  parentRefs:
  - name: gateway
    sectionName: http
    # namespace: default
  # Hostnames matching HTTP header.
  hostnames:
  - chart-example.local
  # List of rules and filters applied.
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /headers
